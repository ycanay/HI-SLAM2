Dataset:
  pcd_downsample: 64
  pcd_downsample_init: 32
  adaptive_pointsize: True
  point_size: 0.05
  scale_multiplier: 2.0

Tracking:
  motion_filter:
    thresh: 2.4 # how much motion before considering new keyframe")
    skip_blur: False
  frontend:
    keyframe_thresh: 4.0 # threshold to create a new keyframe")
    frontend_thresh: 16.0 # add edges between frames whithin this distance")
    frontend_window: 25 # frontend optimization window")
    frontend_radius: 2 # force edges between frames within radius")
    frontend_nms: 1 # non-maximal supression of edges")
    mono_depth_alpha: 0.001
  backend:
    backend_thresh: 22.0 # add loop closure edges within this distance (larger is more edges)')
    backend_radius: 2 # connect neighbors within radius (larger is more edges)')
    backend_nms: 3 # non-maximal supression of edges (smaller is more edges)')
    covis_thresh: 0.2
  pgba:
    active: False
    pgba_thresh: 22.0 # add loop closure edges within this distance (larger is more edges)')

Training:
  init_itr_num: 1000
  init_gaussian_update: 100
  init_gaussian_reset: 550
  init_gaussian_th: 0.005
  init_gaussian_extent: 30
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 1.0
  gaussian_reset: 2001
  size_threshold: 20
  window_size: 10
  rgb_boundary_threshold: 0.01
  lambda_dnormal: 0.1
  compensate_exposure: false
  optimize_ins_feats_step: 1000

opt_params:
  iteration_per_scene: 10
  pose_lr: 0.0001
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_max_steps: 5000
  feature_lr: 0.0025
  opacity_lr: 0.05
  ins_feature_lr: 0.01
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  densify_grad_threshold: 0.0002
  lambda_cohesion: 0.01
  ins_feat_optimization_per_step: 5
masks:
  source: "sam3" # options: sam3 | mask2former (mas2former alias supported)
  network: "facebook/mask2former-swin-large-coco-panoptic"
  mask2former_network: "facebook/mask2former-swin-large-coco-panoptic"
  sam3_masks_dir: "/storage/user/ayu/repos/HI-SLAM2/data/masks/{scene}/masks/"
  mask2former_masks_dir: "/storage/user/ayu/repos/HI-SLAM2/outputs/masks/mask2former/"
  no_classes: 101
  clustering:
    min_cluster_size: 100
    # NeRF-style positional encoding for Gaussian xyz in clustering.
    # Increasing posenc dims makes position contribute more (vs ins_feat).
    posenc_num_freqs: 0
    posenc_include_input: false
    posenc_log_sampling: false
    posenc_normalize_positions: true
    # Relative weights after per-block standardization.
    pos_weight: 1.0
    ins_weight: 1.0
mask_cache_max_frames: 500
